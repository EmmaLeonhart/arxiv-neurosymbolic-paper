<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Dot Product Visualizer">
  <meta property="og:description" content="Interactive 2D visualization of the dot product — drag vectors and see projection, angle, and both formulas update in real time.">
  <meta property="og:url" content="https://emmaleonhart.com/dotproduct/">
  <meta name="description" content="Interactive dot product visualizer. Drag two vectors to see the projection shadow, angle, and how the algebraic and geometric formulas give the same answer.">
  <title>Dot Product Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #d0d0dc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px;
    }
    .container {
      max-width: 800px;
      width: 100%;
    }
    .back {
      display: inline-block;
      color: #7c8cf8;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .back:hover { text-decoration: underline; }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #e8e8f0;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }
    .subtitle {
      color: #8888a0;
      font-size: 0.95rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .canvas-wrap {
      width: 100%;
      border: 1px solid #1e1e2a;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
      background: #0a0a0f;
    }
    canvas {
      display: block;
      width: 100%;
      touch-action: none;
    }
    #info {
      background: #12121a;
      border: 1px solid #1e1e2a;
      border-radius: 8px;
      padding: 20px;
    }
    .info-grid {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .info-vec {
      flex: 1;
      padding: 10px 14px;
      background: #0e0e16;
      border-radius: 6px;
      border-left: 3px solid;
      font-size: 0.9rem;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      line-height: 1.6;
    }
    .dot-a { color: #f97316; font-weight: 700; }
    .dot-b { color: #38bdf8; font-weight: 700; }
    .work-card {
      background: #0e0e16;
      border-radius: 6px;
      padding: 16px 20px;
      margin-bottom: 16px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.95rem;
    }
    .work-step {
      display: flex;
      justify-content: center;
      align-items: baseline;
      line-height: 2.2;
    }
    .work-step .term {
      display: inline-block;
      min-width: 70px;
      text-align: right;
    }
    .work-step .op {
      display: inline-block;
      width: 30px;
      text-align: center;
      color: #666880;
    }
    .work-step.dim { color: #666880; }
    .work-result {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      padding-top: 6px;
      border-top: 1px solid #1e1e2a;
      margin-top: 4px;
      transition: color 0.3s;
    }
    .section-label {
      font-size: 0.65rem;
      color: #666880;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .geo-line {
      line-height: 1.9;
      font-size: 0.88rem;
      color: #9898ac;
    }
    .geo-line .label {
      color: #666880;
      display: inline-block;
      min-width: 70px;
    }
    .geo-line .eq { color: #666880; }
    .geo-check {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #1e1e2a;
      font-size: 0.88rem;
      color: #9898ac;
    }
    .insight-box {
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 0.85rem;
      line-height: 1.5;
      margin-bottom: 16px;
      transition: all 0.3s;
    }
    .angle-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .angle-bar-wrap {
      flex: 1;
    }
    .info-detail {
      color: #8888a0;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    #angleBar {
      height: 6px;
      border-radius: 3px;
      background: #1e1e2a;
      overflow: hidden;
    }
    #angleBarFill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #34d399, #facc15, #f43f5e);
      transition: width 0.1s;
    }
    #angleLabel {
      font-size: 0.7rem;
      color: #666880;
      margin-top: 4px;
      display: flex;
      justify-content: space-between;
    }
    @media (max-width: 480px) {
      body { padding: 24px 12px; }
      h1 { font-size: 1.3rem; }
      .info-grid { flex-direction: column; }
      .work-card { padding: 12px 10px; font-size: 0.85rem; }
      .work-step .term { min-width: 55px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="/">&larr; Home</a>
    <h1>Dot Product Visualizer</h1>
    <p class="subtitle">The dot product measures how aligned two vectors are, weighted by their magnitudes. Bigger vectors can make up for less alignment. Drag the tips to explore.</p>
    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>
    <div id="info">
      <div class="info-grid">
        <div class="info-vec" style="border-left-color: #f97316;">
          <span class="dot-a">A</span> = (<span id="ax">6</span>, <span id="ay">0</span>)
        </div>
        <div class="info-vec" style="border-left-color: #38bdf8;">
          <span class="dot-b">B</span> = (<span id="bx">3</span>, <span id="by">3</span>)
        </div>
      </div>
      <div class="section-label">Algebraic</div>
      <div id="work" class="work-card">
        <!-- JS builds the step-by-step work here -->
      </div>
      <div class="section-label">Geometric</div>
      <div id="geo" class="work-card">
        <!-- JS builds magnitudes, cosine similarity, check here -->
      </div>
      <div id="insightBox" class="insight-box"></div>
      <div class="angle-row">
        <div class="info-detail">&theta; = <span id="angleVal" style="font-weight:600;">45.0&deg;</span></div>
        <div class="angle-bar-wrap">
          <div id="angleBar"><div id="angleBarFill" style="width:25%"></div></div>
          <div id="angleLabel"><span>0&deg;</span><span>90&deg;</span><span>180&deg;</span></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
