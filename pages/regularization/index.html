<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Regularization Techniques">
  <meta property="og:description" content="Interactive visualization of L1, L2, Elastic Net, Dropout, and Batch Normalization.">
  <meta property="og:url" content="https://emmaleonhart.com/regularization/">
  <title>Regularization Techniques</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0a0a0f; color: #d0d0dc; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; }
    .container { max-width: 960px; width: 100%; }
    .back { display: inline-block; color: #7c8cf8; text-decoration: none; font-size: 0.9rem; margin-bottom: 24px; }
    .back:hover { text-decoration: underline; }
    h1 { font-size: 1.6rem; font-weight: 700; color: #e8e8f0; margin-bottom: 8px; letter-spacing: -0.3px; }
    .subtitle { color: #8888a0; font-size: 0.95rem; margin-bottom: 20px; line-height: 1.5; }
    .canvas-row { display: flex; gap: 14px; margin-bottom: 20px; }
    .canvas-wrap { flex: 1; border: 1px solid #1e1e2a; border-radius: 8px; overflow: hidden; background: #0a0a0f; }
    canvas { display: block; width: 100%; touch-action: none; }
    .controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .ctrl-btn { padding: 6px 14px; background: #12121a; border: 2px solid #1e1e2a; border-radius: 8px; color: #b0b0cc; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
    .ctrl-btn:hover { border-color: #3a3a50; background: #16161f; }
    .ctrl-btn.active { border-color: #7c8cf8; background: rgba(124, 140, 248, 0.1); color: #e8e8f0; }
    .ctrl-sep { width: 1px; background: #1e1e2a; align-self: stretch; margin: 0 4px; }
    .slider-group { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #9898ac; }
    .slider-group input { width: 80px; accent-color: #7c8cf8; }
    .slider-group span { font-family: 'Cascadia Code', monospace; width: 32px; }
    .info-row { display: flex; gap: 14px; align-items: flex-start; }
    .info-panel { flex: 1; background: #12121a; border: 1px solid #1e1e2a; border-radius: 8px; padding: 14px; min-width: 0; }
    .section-label { font-size: 0.65rem; color: #666880; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    #math-panel { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.78rem; color: #9898ac; line-height: 1.8; }
    #insight-box { padding: 10px 12px; background: rgba(124, 140, 248, 0.04); border-left: 3px solid #7c8cf8; border-radius: 0 6px 6px 0; font-size: 0.82rem; line-height: 1.5; color: #9898ac; }
    @media (max-width: 700px) { .canvas-row { flex-direction: column; } .info-row { flex-direction: column; } }
    @media (max-width: 480px) { body { padding: 24px 12px; } h1 { font-size: 1.3rem; } }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="/">&larr; Home</a>
    <h1>Regularization Techniques</h1>
    <p class="subtitle">Weight penalty methods (L1/L2/Elastic Net) and training-time regularization (Dropout/Batch Norm) are independent techniques. Select a category below to explore.</p>
    <div class="controls">
      <button class="ctrl-btn active" data-reg="l1">L1 (Lasso)</button>
      <button class="ctrl-btn" data-reg="l2">L2 (Ridge)</button>
      <button class="ctrl-btn" data-reg="elastic">Elastic Net</button>
      <div class="ctrl-sep"></div>
      <button class="ctrl-btn active" data-viz="dropout">Dropout</button>
      <button class="ctrl-btn" data-viz="batchnorm">Batch Norm</button>
      <div class="ctrl-sep"></div>
      <button class="ctrl-btn" id="btn-resample">Resample</button>
    </div>
    <div class="controls">
      <div class="slider-group">&lambda;: <input type="range" id="lambda-slider" min="0.1" max="5.0" step="0.1" value="2.0"> <span id="lambda-value">2.0</span></div>
      <div id="alpha-wrap" class="slider-group" style="display:none">&alpha;: <input type="range" id="alpha-slider" min="0" max="1" step="0.05" value="0.5"> <span id="alpha-value">0.50</span></div>
      <div id="dropout-wrap" class="slider-group">Drop: <input type="range" id="dropout-slider" min="0" max="0.9" step="0.05" value="0.3"> <span id="dropout-value">0.3</span></div>
    </div>
    <div class="canvas-row">
      <div class="canvas-wrap" id="wrap1"><canvas id="canvas1"></canvas></div>
      <div class="canvas-wrap" id="wrap2" style="display:none"><canvas id="canvas2"></canvas></div>
    </div>
    <div class="info-row">
      <div class="info-panel">
        <div class="section-label">Formula</div>
        <div id="math-panel"></div>
      </div>
      <div class="info-panel">
        <div id="insight-box"></div>
      </div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
